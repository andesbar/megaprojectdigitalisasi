# --- 1. SETTING KHUSUS UNTUK LOCALHOST (ROOT) ---
<VirtualHost *:443>
    ServerName localhost
    # Root langsung ke folder utama D:\MEGAPROJECT
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/cert.pem
    SSLCertificateKeyFile /etc/apache2/ssl/key.pem

    <Directory "/var/www/html">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# --- 2. SETTING OTOMATIS UNTUK SUBDOMAIN (*.localhost) ---
<VirtualHost *:443>
    ServerAlias *.localhost
    # Mengarahkan ke folder sesuai nama subdomain
    VirtualDocumentRoot "/var/www/html/%1"

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/cert.pem
    SSLCertificateKeyFile /etc/apache2/ssl/key.pem

    <Directory "/var/www/html">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# --- 3. REDIRECT HTTP KE HTTPS (OPSIONAL) ---
<VirtualHost *:80>
    ServerAlias *.localhost localhost
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>
